[libdefaults]
    default_realm = ICSHUB.LOCAL
    dns_lookup_realm = false
    dns_lookup_kdc = false
    ticket_lifetime = 24h
    forwardable = true

[realms]
    ICSHUB.LOCAL = {
        kdc = 192.168.30.50
        admin_server = 192.168.30.50
    }

[domain_realm]
    .icshub.local = ICSHUB.LOCAL
    icshub.local = ICSHUB.LOCAL
